<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "background": "#f4f1ea",
                        "on-error-container": "#93000a",
                        "surface": "#f4f1ea",
                        "secondary-container": "#fecd6f",
                        "on-surface-variant": "#4A3C31",
                        "on-surface": "#4A3C31",
                        "inverse-on-surface": "#f3f0e9",
                        "outline-variant": "#c4c8bf",
                        "on-secondary-fixed": "#261900",
                        "error-container": "#ffdad6",
                        "secondary-fixed-dim": "#eec063",
                        "inverse-surface": "#31312c",
                        "on-primary-fixed-variant": "#3b4b39",
                        "tertiary-fixed-dim": "#d8c3b4",
                        "primary-container": "#7A8B76",
                        "on-tertiary-container": "#fffbff",
                        "on-primary-fixed": "#111f10",
                        "on-tertiary": "#ffffff",
                        "inverse-primary": "#baccb4",
                        "surface-container-highest": "#e5e2db",
                        "surface-bright": "#f4f1ea",
                        "tertiary-fixed": "#f5decf",
                        "surface-tint": "#7A8B76",
                        "surface-container-low": "#efece4",
                        "surface-container-high": "#ebe8e1",
                        "on-secondary-fixed-variant": "#5d4200",
                        "tertiary-container": "#827164",
                        "on-primary": "#ffffff",
                        "secondary": "#7b5900",
                        "on-secondary-container": "#775600",
                        "on-background": "#4A3C31",
                        "secondary-fixed": "#ffdea4",
                        "on-secondary": "#ffffff",
                        "on-primary-container": "#f7fff1",
                        "outline": "#747871",
                        "on-error": "#ffffff",
                        "surface-dim": "#dcdad3",
                        "surface-variant": "#e5e2db",
                        "error": "#ba1a1a",
                        "surface-container-lowest": "#ffffff",
                        "primary-fixed": "#d6e8cf",
                        "tertiary": "#69594d",
                        "primary": "#7A8B76",
                        "on-tertiary-fixed-variant": "#524439",
                        "surface-container": "#f1eee7",
                        "primary-fixed-dim": "#baccb4",
                        "on-tertiary-fixed": "#241910"
                    },
                    "fontFamily": {
                        "headline-md": ["Plus Jakarta Sans"],
                        "display-lg": ["Plus Jakarta Sans"],
                        "title-lg": ["Plus Jakarta Sans"],
                        "body-lg": ["Plus Jakarta Sans"],
                        "label-sm": ["Plus Jakarta Sans"],
                        "label-lg": ["Plus Jakarta Sans"],
                        "headline-lg": ["Plus Jakarta Sans"],
                        "body-md": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "display-lg": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "title-lg": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "label-sm": ["11px", {"lineHeight": "16px", "fontWeight": "500"}],
                        "label-lg": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                        "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .rugged-shadow {
            box-shadow: 0 4px 20px -2px rgba(74, 60, 49, 0.08);
        }
        
        /* Tab functionality via Peer Selector */
        .tab-content { display: none; }
        #tab-dist:checked ~ .tabs-container .tab-dist-label { 
            background-color: #7A8B76; 
            color: white; 
        }
        #tab-time:checked ~ .tabs-container .tab-time-label { 
            background-color: #7A8B76; 
            color: white; 
        }
        #tab-dist:checked ~ .content-container .dist-panel { display: block; }
        #tab-time:checked ~ .content-container .time-panel { display: block; }
    </style>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-4 h-16 bg-[#F4F1EA] dark:bg-stone-900 border-b border-stone-200 dark:border-stone-800 shadow-sm shadow-stone-200/50">
<div class="flex items-center gap-4">
<button class="transition-all duration-200 active:scale-95 hover:bg-stone-100 dark:hover:bg-stone-800 p-2 rounded-full text-[#7A8B76]">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-['Plus_Jakarta_Sans'] font-bold text-lg text-[#7A8B76] dark:text-emerald-400">New Maintenance Item</h1>
</div>
</header>
<main class="pt-24 pb-32 px-4 max-w-2xl mx-auto">
<!-- Form Container -->
<div class="space-y-6">
<!-- Description Field -->
<div class="bg-surface-container-lowest p-6 rounded-2xl rugged-shadow border border-surface-container-high">
<label class="block font-title-lg text-[#4A3C31] mb-3" for="description">Description</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-tertiary material-symbols-outlined" data-icon="edit_note">edit_note</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-low border-none rounded-xl focus:ring-2 focus:ring-primary text-body-lg placeholder:text-outline-variant" id="description" placeholder="e.g., Oil Change" type="text"/>
</div>
</div>
<!-- Schedule Configurator Section -->
<div class="bg-surface-container-lowest p-6 rounded-2xl rugged-shadow border border-surface-container-high">
<div class="flex items-center gap-3 mb-6">
<span class="material-symbols-outlined text-[#7A8B76]" data-icon="event_repeat">event_repeat</span>
<h3 class="font-headline-md text-on-surface">Schedule Configurator</h3>
</div>
<input checked="" class="hidden" id="tab-dist" name="schedule-type" type="radio"/>
<input class="hidden" id="tab-time" name="schedule-type" type="radio"/>
<div class="tabs-container flex p-1 bg-surface-container-low rounded-xl mb-6">
<label class="tab-dist-label flex-1 text-center py-2.5 rounded-lg font-label-lg cursor-pointer transition-colors text-on-surface-variant uppercase tracking-wider" for="tab-dist">Distance</label>
<label class="tab-time-label flex-1 text-center py-2.5 rounded-lg font-label-lg cursor-pointer transition-colors text-on-surface-variant uppercase tracking-wider" for="tab-time">Time</label>
</div>
<div class="content-container">
<!-- Distance Interval Panel -->
<div class="tab-content dist-panel space-y-3">
<label class="block font-label-lg text-on-surface-variant uppercase tracking-wider">Distance interval</label>
<div class="relative flex items-center">
<input class="w-full px-4 py-4 bg-surface-container-low border-none rounded-xl focus:ring-2 focus:ring-primary text-body-lg" placeholder="5,000" type="number"/>
<span class="absolute right-4 font-label-lg text-tertiary">Miles</span>
</div>
</div>
<!-- Time Schedule Panel -->
<div class="tab-content time-panel space-y-3">
<label class="block font-label-lg text-on-surface-variant uppercase tracking-wider">Time schedule</label>
<div class="flex gap-2">
<input class="w-1/3 px-4 py-4 bg-surface-container-low border-none rounded-xl focus:ring-2 focus:ring-primary text-body-lg" placeholder="6" type="number"/>
<div class="relative w-2/3">
<select class="w-full h-full px-4 py-4 bg-surface-container-low border-none rounded-xl focus:ring-2 focus:ring-primary text-body-lg appearance-none">
<option>Weeks</option>
<option selected="">Months</option>
<option>Years</option>
</select>
<span class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none material-symbols-outlined text-tertiary" data-icon="expand_more">expand_more</span>
</div>
</div>
</div>
</div>
</div>
</div>
</main>
<!-- Bottom Action Button Area -->
<div class="fixed bottom-0 left-0 w-full p-6 bg-gradient-to-t from-background via-background to-transparent pointer-events-none">
<div class="max-w-2xl mx-auto pointer-events-auto">
<button class="w-full py-5 bg-[#7A8B76] text-white font-headline-md rounded-2xl shadow-xl shadow-[#7A8B76]/20 transition-all duration-300 active:scale-95 flex items-center justify-center gap-3">
<span class="material-symbols-outlined" data-icon="check_circle" data-weight="fill">check_circle</span>
                Create Item
            </button>
</div>
</div>
</body></html>
