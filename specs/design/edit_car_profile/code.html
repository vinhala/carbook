<body class="bg-background text-on-background antialiased pb-24 md:pb-8 pt-16">
<!-- TopAppBar Component -->
<header class="fixed top-0 w-full z-50 bg-[#FAF9F6] border-b border-stone-200 shadow-sm shadow-stone-900/10 flex items-center justify-between px-4 h-16 transition-colors duration-200">
<button class="text-stone-500 hover:bg-stone-100 active:scale-95 transition-all duration-200 p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="text-[#7A8B76] font-['Plus_Jakarta_Sans'] font-bold text-lg text-center flex-1">Edit Profile</h1>
<button class="text-[#7A8B76] hover:bg-stone-100 active:scale-95 transition-all duration-200 p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="save">save</span>
</button>
</header>
<main class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 pt-6 space-y-6">
<!-- Image Upload Section -->
<section class="flex flex-col items-center justify-center pt-4">
<div class="relative w-32 h-32 rounded-xl bg-surface-variant flex items-center justify-center overflow-hidden border-2 border-dashed border-outline-variant group cursor-pointer hover:border-primary transition-colors">
<img alt="Car profile picture" class="object-cover w-full h-full opacity-70 group-hover:opacity-50 transition-opacity" data-alt="Rugged off-road vehicle parked on a dusty trail with mountains in the background during golden hour" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA5gqCk3gw-bFswcNIgtwjEhhHeBVwn0fPhFgLr_L-IHy647vK-Hsn9T1rUsstwZ9oTXA4X4wOlXrhHvftI9QzSke3vSYKp0dzmkZAbla3V0aa9Hab34t8VBhEeLd5AlHzMzN2eMR73kNVTZxGQC27_0ziQ3hA07-hT1v4Gri9qunsc31g2eB_2hucZ6ta7Ds04qknbkj-P2Ahs5im7EmgS6PBQc9ddytKQrg62RufTDmX807R3sOkySFEzmHp4miwPdb4Kv0qldxM"/>
<div class="absolute inset-0 flex flex-col items-center justify-center bg-black/20 group-hover:bg-black/40 transition-colors">
<span class="material-symbols-outlined text-white text-3xl mb-1">add_a_photo</span>
<span class="font-label-sm text-white">Change Photo</span>
</div>
</div>
</section>
<!-- Warning Banner -->
<div class="bg-secondary-container/20 border border-secondary-container rounded-xl p-4 flex items-start gap-3 shadow-sm">
<span class="material-symbols-outlined text-secondary mt-0.5">warning</span>
<div>
<h3 class="font-title-lg text-title-lg text-secondary mb-1">Mileage Reminder Risk</h3>
<p class="font-body-md text-body-md text-on-surface-variant">Your mileage reminder is set to "Quarterly". This might risk missing critical maintenance intervals for an older vehicle. Consider changing it to "Monthly".</p>
</div>
</div>
<!-- Form Fields -->
<form class="space-y-6">
<div class="bg-surface-container-lowest rounded-xl p-6 shadow-[0_4px_12px_rgba(105,89,77,0.08)] border border-surface-variant">
<h2 class="font-title-lg text-title-lg text-on-background mb-4 border-b border-surface-variant pb-2">Vehicle Details</h2>
<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
<div class="flex flex-col gap-1">
<label class="font-label-sm text-label-sm text-tertiary" for="make">Make</label>
<input class="bg-surface-container-low border-b-2 border-tertiary text-on-background font-body-lg text-body-lg px-4 py-3 rounded-t-md focus:outline-none focus:border-primary focus:bg-surface-container-highest transition-colors" id="make" type="text" value="Toyota"/>
</div>
<div class="flex flex-col gap-1">
<label class="font-label-sm text-label-sm text-tertiary" for="model">Model</label>
<input class="bg-surface-container-low border-b-2 border-tertiary text-on-background font-body-lg text-body-lg px-4 py-3 rounded-t-md focus:outline-none focus:border-primary focus:bg-surface-container-highest transition-colors" id="model" type="text" value="4Runner TRD Pro"/>
</div>
<div class="flex flex-col gap-1 sm:col-span-2">
<label class="font-label-sm text-label-sm text-tertiary" for="engine">Engine</label>
<input class="bg-surface-container-low border-b-2 border-tertiary text-on-background font-body-lg text-body-lg px-4 py-3 rounded-t-md focus:outline-none focus:border-primary focus:bg-surface-container-highest transition-colors" id="engine" type="text" value="4.0L V6"/>
</div>
<div class="flex flex-col gap-1">
<label class="font-label-sm text-label-sm text-tertiary" for="regDate">Registration Date</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-tertiary">calendar_month</span>
<input class="w-full bg-surface-container-low border-b-2 border-tertiary text-on-background font-body-lg text-body-lg pl-10 pr-4 py-3 rounded-t-md focus:outline-none focus:border-primary focus:bg-surface-container-highest transition-colors" id="regDate" type="date" value="2018-05-14"/>
</div>
</div>
<div class="flex flex-col gap-1">
<label class="font-label-sm text-label-sm text-tertiary" for="mileage">Current Mileage</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-tertiary">speed</span>
<input class="w-full bg-surface-container-low border-b-2 border-tertiary text-on-background font-body-lg text-body-lg pl-10 pr-4 py-3 rounded-t-md focus:outline-none focus:border-primary focus:bg-surface-container-highest transition-colors" id="mileage" type="number" value="85420"/>
</div>
</div>
<div class="flex flex-col gap-1 sm:col-span-2 mt-2">
<label class="font-label-sm text-label-sm text-tertiary" for="reminder">Mileage Reminder Frequency</label>
<select class="bg-surface-container-low border-b-2 border-tertiary text-on-background font-body-lg text-body-lg px-4 py-3 rounded-t-md focus:outline-none focus:border-primary focus:bg-surface-container-highest transition-colors appearance-none" id="reminder">
<option value="monthly">Monthly</option>
<option selected="" value="quarterly">Quarterly</option>
<option value="yearly">Yearly</option>
<option value="never">Never</option>
</select>
</div>
</div>
</div>
<!-- Document Management -->
<!-- Actions -->
<div class="pt-4 flex flex-col gap-4">
<button class="w-full bg-[#7A8B76] text-white font-label-lg text-label-lg py-4 rounded-xl shadow-md flex items-center justify-center gap-2 hover:bg-[#6A7B66] active:scale-[0.98] transition-all border border-[#526350]" type="submit">
<span class="material-symbols-outlined">save</span>
                    Save Changes
                </button>
<button class="w-full text-error/80 font-label-lg text-label-lg py-4 rounded-xl flex items-center justify-center gap-2 hover:bg-error/5 active:scale-[0.98] transition-all" type="button">
<span class="material-symbols-outlined">delete_forever</span>
                    Delete Car Profile
                </button>
</div>
</form>
</main>
