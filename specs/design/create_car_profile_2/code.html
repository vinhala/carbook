<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Car Profile Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "outline": "#747871",
                        "on-background": "#1c1c18",
                        "on-secondary-fixed-variant": "#5d4200",
                        "primary-fixed": "#d6e8cf",
                        "surface-container-highest": "#e5e2db",
                        "inverse-surface": "#31312c",
                        "surface-dim": "#dcdad3",
                        "tertiary-fixed-dim": "#d8c3b4",
                        "secondary-fixed-dim": "#eec063",
                        "primary-fixed-dim": "#baccb4",
                        "tertiary": "#69594d",
                        "surface-bright": "#fcf9f2",
                        "surface-tint": "#526350",
                        "on-error": "#ffffff",
                        "tertiary-fixed": "#f5decf",
                        "outline-variant": "#c4c8bf",
                        "on-tertiary-fixed-variant": "#524439",
                        "on-primary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "surface": "#fcf9f2",
                        "on-error-container": "#93000a",
                        "inverse-on-surface": "#f3f0e9",
                        "primary": "#50604d",
                        "on-surface": "#1c1c18",
                        "on-tertiary": "#ffffff",
                        "on-primary-fixed": "#111f10",
                        "on-secondary-container": "#775600",
                        "surface-container-low": "#f6f3ec",
                        "secondary-fixed": "#ffdea4",
                        "error": "#ba1a1a",
                        "on-tertiary-container": "#fffbff",
                        "primary-container": "#687965",
                        "on-tertiary-fixed": "#241910",
                        "on-surface-variant": "#444842",
                        "on-secondary-fixed": "#261900",
                        "on-secondary": "#ffffff",
                        "on-primary-container": "#f7fff1",
                        "secondary-container": "#fecd6f",
                        "inverse-primary": "#baccb4",
                        "tertiary-container": "#827164",
                        "surface-container-high": "#ebe8e1",
                        "surface-container": "#f1eee7",
                        "background": "#fcf9f2",
                        "error-container": "#ffdad6",
                        "surface-variant": "#e5e2db",
                        "secondary": "#7b5900",
                        "on-primary-fixed-variant": "#3b4b39"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-mobile": "16px",
                        "margin-tablet": "32px",
                        "xs": "4px",
                        "gutter": "16px",
                        "sm": "8px",
                        "base": "8px",
                        "md": "16px",
                        "lg": "24px",
                        "xl": "32px"
                    },
                    "fontFamily": {
                        "headline-md": ["Plus Jakarta Sans"],
                        "label-sm": ["Plus Jakarta Sans"],
                        "body-lg": ["Plus Jakarta Sans"],
                        "display-lg": ["Plus Jakarta Sans"],
                        "body-md": ["Plus Jakarta Sans"],
                        "headline-lg": ["Plus Jakarta Sans"],
                        "label-lg": ["Plus Jakarta Sans"],
                        "title-lg": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "label-sm": ["11px", { "lineHeight": "16px", "fontWeight": "500" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "display-lg": ["40px", { "lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "label-lg": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "title-lg": ["20px", { "lineHeight": "28px", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        body {
            background-color: theme('colors.background');
            color: theme('colors.on-background');
            -webkit-tap-highlight-color: transparent;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="antialiased min-h-screen pb-safe">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 border-b border-stone-200 dark:border-stone-800 shadow-sm shadow-stone-900/10 bg-[#FAF9F6] dark:bg-stone-900 flex items-center justify-between px-4 h-16">
<button class="w-10 h-10 flex items-center justify-center text-[#7A8B76] dark:text-[#9FB09B] hover:bg-stone-100 dark:hover:bg-stone-800 transition-colors rounded-full active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-['Plus_Jakarta_Sans'] font-bold text-lg text-[#7A8B76] dark:text-[#9FB09B]">Add New Car</h1>
<div class="w-10"></div> <!-- Placeholder for balance -->
</header>
<main class="pt-24 pb-24 px-margin-mobile md:px-margin-tablet max-w-3xl mx-auto space-y-lg">
<!-- Media Upload Section -->
<section class="flex flex-col items-center">
<div class="relative w-full aspect-video max-h-64 rounded-xl overflow-hidden bg-surface-container border-2 border-dashed border-outline-variant flex items-center justify-center cursor-pointer hover:bg-surface-container-high transition-colors group shadow-[0_4px_12px_rgba(105,89,77,0.08)]">
<div class="text-center space-y-sm">
<span class="material-symbols-outlined text-4xl text-tertiary group-hover:scale-110 transition-transform duration-200" data-icon="photo_camera" style="font-variation-settings: 'FILL' 1;">photo_camera</span>
<p class="font-body-md text-on-surface-variant font-medium">Tap to upload a picture</p>
</div>
</div>
</section>
<!-- Form Fields -->
<section class="bg-surface-container-lowest rounded-xl p-lg shadow-[0_4px_12px_rgba(105,89,77,0.08)] space-y-md">
<div class="relative">
<input class="block rounded-lg px-4 pt-6 pb-2 w-full font-body-lg text-on-surface bg-surface-container-low border-b-2 border-tertiary appearance-none focus:outline-none focus:ring-0 peer" id="make" placeholder=" " type="text"/>
<label class="absolute font-body-md text-on-surface-variant duration-300 transform -translate-y-3 scale-75 top-4 z-10 origin-[0] start-4 peer-focus:text-tertiary peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-3" for="make">Make</label>
</div>
<div class="relative">
<input class="block rounded-lg px-4 pt-6 pb-2 w-full font-body-lg text-on-surface bg-surface-container-low border-b-2 border-tertiary appearance-none focus:outline-none focus:ring-0 peer" id="model" placeholder=" " type="text"/>
<label class="absolute font-body-md text-on-surface-variant duration-300 transform -translate-y-3 scale-75 top-4 z-10 origin-[0] start-4 peer-focus:text-tertiary peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-3" for="model">Model</label>
</div><div class="relative">
<input class="block rounded-lg px-4 pt-6 pb-2 w-full font-body-lg text-on-surface bg-surface-container-low border-b-2 border-tertiary appearance-none focus:outline-none focus:ring-0 peer" id="vin" placeholder=" " type="text"/>
<label class="absolute font-body-md text-on-surface-variant duration-300 transform -translate-y-3 scale-75 top-4 z-10 origin-[0] start-4 peer-focus:text-tertiary peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-3" for="vin">VIN</label>
</div>
<div class="relative">
<input class="block rounded-lg px-4 pt-6 pb-2 w-full font-body-lg text-on-surface bg-surface-container-low border-b-2 border-tertiary appearance-none focus:outline-none focus:ring-0 peer" id="engine" placeholder=" " type="text"/>
<label class="absolute font-body-md text-on-surface-variant duration-300 transform -translate-y-3 scale-75 top-4 z-10 origin-[0] start-4 peer-focus:text-tertiary peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-3" for="engine">Engine (e.g., 2.0L I4)</label>
</div>
</section>
<!-- Date & Number Fields -->
<section class="bg-surface-container-lowest rounded-xl p-lg shadow-[0_4px_12px_rgba(105,89,77,0.08)] space-y-md">
<div class="relative">
<input class="block rounded-lg px-4 pt-6 pb-2 w-full font-body-lg text-on-surface bg-surface-container-low border-b-2 border-tertiary appearance-none focus:outline-none focus:ring-0 peer" id="registration" type="month"/>
<label class="absolute font-body-md text-on-surface-variant duration-300 transform -translate-y-3 scale-75 top-4 z-10 origin-[0] start-4 peer-focus:text-tertiary" for="registration">First Registration</label>
</div>
<div class="relative">
<input class="block rounded-lg px-4 pt-6 pb-2 w-full font-body-lg text-on-surface bg-surface-container-low border-b-2 border-tertiary appearance-none focus:outline-none focus:ring-0 peer" id="mileage" placeholder=" " type="number"/>
<label class="absolute font-body-md text-on-surface-variant duration-300 transform -translate-y-3 scale-75 top-4 z-10 origin-[0] start-4 peer-focus:text-tertiary peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-3" for="mileage">Current Mileage</label>
<span class="absolute right-4 top-4 font-body-lg text-on-surface-variant">mi</span>
</div>
</section>
<!-- Settings: Reminders -->
<section class="bg-surface-container-lowest rounded-xl p-lg shadow-[0_4px_12px_rgba(105,89,77,0.08)]">
<h2 class="font-title-lg text-on-surface mb-md">Mileage Reminders</h2>
<p class="font-body-md text-on-surface-variant mb-md">How often should we remind you to update your mileage?</p>
<div class="flex flex-wrap gap-2">
<label class="cursor-pointer">
<input class="peer sr-only" name="reminder" type="radio" value="weekly"/>
<div class="px-4 py-2 rounded-full border border-outline-variant font-label-lg text-on-surface-variant peer-checked:bg-primary-container peer-checked:text-on-primary-container peer-checked:border-primary-container transition-colors">
                        Weekly
                    </div>
</label>
<label class="cursor-pointer">
<input checked="" class="peer sr-only" name="reminder" type="radio" value="monthly"/>
<div class="px-4 py-2 rounded-full border border-outline-variant font-label-lg text-on-surface-variant peer-checked:bg-primary-container peer-checked:text-on-primary-container peer-checked:border-primary-container transition-colors">
                        Monthly
                    </div>
</label>
<label class="cursor-pointer">
<input class="peer sr-only" name="reminder" type="radio" value="quarterly"/>
<div class="px-4 py-2 rounded-full border border-outline-variant font-label-lg text-on-surface-variant peer-checked:bg-primary-container peer-checked:text-on-primary-container peer-checked:border-primary-container transition-colors">
                        Quarterly
                    </div>
</label>
<label class="cursor-pointer">
<input class="peer sr-only" name="reminder" type="radio" value="never"/>
<div class="px-4 py-2 rounded-full border border-outline-variant font-label-lg text-on-surface-variant peer-checked:bg-surface-variant peer-checked:text-on-surface-variant peer-checked:border-surface-variant transition-colors">
                        Never
                    </div>
</label>
</div>
</section>
<!-- Action Area -->
<div class="pt-md">
<button class="w-full bg-primary text-on-primary font-label-lg py-4 rounded-xl shadow-[0_4px_12px_rgba(80,96,77,0.2)] active:scale-[0.98] transition-transform duration-200 border border-primary-fixed-dim">
                Create Profile
            </button>
</div>
</main>
</body></html>
