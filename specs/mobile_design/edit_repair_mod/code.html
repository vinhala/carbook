<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Edit Repair &amp; Modification Form</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "tertiary-fixed": "#f5decf",
                      "surface-tint": "#526350",
                      "surface-container-high": "#ebe8e1",
                      "on-secondary-fixed-variant": "#5d4200",
                      "tertiary-container": "#827164",
                      "on-primary": "#ffffff",
                      "surface-container-low": "#f6f3ec",
                      "surface-variant": "#e5e2db",
                      "error": "#ba1a1a",
                      "secondary": "#7b5900",
                      "on-secondary-container": "#775600",
                      "on-background": "#1c1c18",
                      "secondary-fixed": "#ffdea4",
                      "on-secondary": "#ffffff",
                      "on-primary-container": "#f7fff1",
                      "outline": "#747871",
                      "on-error": "#ffffff",
                      "surface-dim": "#dcdad3",
                      "tertiary": "#69594d",
                      "primary": "#50604d",
                      "on-tertiary-fixed-variant": "#524439",
                      "surface-container": "#f1eee7",
                      "primary-fixed-dim": "#baccb4",
                      "on-tertiary-fixed": "#241910",
                      "surface-container-lowest": "#ffffff",
                      "primary-fixed": "#d6e8cf",
                      "surface": "#fcf9f2",
                      "secondary-container": "#fecd6f",
                      "on-surface-variant": "#444842",
                      "background": "#fcf9f2",
                      "on-error-container": "#93000a",
                      "secondary-fixed-dim": "#eec063",
                      "inverse-surface": "#31312c",
                      "on-primary-fixed-variant": "#3b4b39",
                      "on-surface": "#1c1c18",
                      "inverse-on-surface": "#f3f0e9",
                      "outline-variant": "#c4c8bf",
                      "on-secondary-fixed": "#261900",
                      "error-container": "#ffdad6",
                      "primary-container": "#687965",
                      "on-tertiary-container": "#fffbff",
                      "on-primary-fixed": "#111f10",
                      "tertiary-fixed-dim": "#d8c3b4",
                      "surface-container-highest": "#e5e2db",
                      "surface-bright": "#fcf9f2",
                      "on-tertiary": "#ffffff",
                      "inverse-primary": "#baccb4"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "margin-mobile": "16px",
                      "lg": "24px",
                      "margin-tablet": "32px",
                      "xs": "4px",
                      "md": "16px",
                      "sm": "8px",
                      "base": "8px",
                      "xl": "32px",
                      "gutter": "16px"
              },
              "fontFamily": {
                      "headline-md": [
                              "Plus Jakarta Sans"
                      ],
                      "display-lg": [
                              "Plus Jakarta Sans"
                      ],
                      "title-lg": [
                              "Plus Jakarta Sans"
                      ],
                      "body-lg": [
                              "Plus Jakarta Sans"
                      ],
                      "label-sm": [
                              "Plus Jakarta Sans"
                      ],
                      "label-lg": [
                              "Plus Jakarta Sans"
                      ],
                      "headline-lg": [
                              "Plus Jakarta Sans"
                      ],
                      "body-md": [
                              "Plus Jakarta Sans"
                      ]
              },
              "fontSize": {
                      "headline-md": [
                              "24px",
                              {
                                      "lineHeight": "32px",
                                      "fontWeight": "600"
                              }
                      ],
                      "display-lg": [
                              "40px",
                              {
                                      "lineHeight": "48px",
                                      "letterSpacing": "-0.02em",
                                      "fontWeight": "700"
                              }
                      ],
                      "title-lg": [
                              "20px",
                              {
                                      "lineHeight": "28px",
                                      "fontWeight": "600"
                              }
                      ],
                      "body-lg": [

                              {
                                      "lineHeight": "24px",
                                      "fontWeight": "400"
                              }
                      ],
                      "label-sm": [
                              "11px",
                              {
                                      "lineHeight": "16px",
                                      "fontWeight": "500"
                              }
                      ],
                      "label-lg": [
                              "12px",
                              {
                                      "lineHeight": "16px",
                                      "letterSpacing": "0.05em",
                                      "fontWeight": "600"
                              }
                      ],
                      "headline-lg": [
                              "32px",
                              {
                                      "lineHeight": "40px",
                                      "letterSpacing": "-0.01em",
                                      "fontWeight": "700"

                      ],
                      "body-md": [
                              "14px",
                              {
                                      "lineHeight": "20px",
                                      "fontWeight": "400"

              }

          },
        }
      </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
      </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-background antialiased min-h-screen pb-24">
<!-- Top App Bar (Semantic Shell: Active for "Edit Repair", assumed sub-page so we might suppress shell normally, but standard layout requested. Using standard header for focus) -->
<header class="bg-surface-bright border-b border-surface-variant px-4 h-16 flex items-center justify-between sticky top-0 z-40 shadow-sm shadow-on-background/5">
<button aria-label="Back" class="text-on-surface-variant hover:text-on-surface p-2 -ml-2 rounded-full hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-title-lg text-title-lg text-on-surface">Edit Entry</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<main class="max-w-2xl mx-auto px-margin-mobile md:px-margin-tablet py-xl space-y-xl">
<!-- Core Details Card -->
<section class="bg-surface-container-lowest rounded-xl p-lg shadow-sm shadow-on-background/10 space-y-md border border-surface-variant/50">
<div>
<label class="block font-label-lg text-label-lg text-on-surface-variant mb-xs" for="title">Title</label>
<input class="w-full bg-surface-container-low border-b-2 border-primary text-on-surface font-body-lg text-body-lg px-4 py-3 rounded-t-DEFAULT focus:outline-none focus:ring-0 focus:border-primary-container transition-colors" id="title" type="text" value="Replace Timing Belt &amp; Water Pump"/>
</div>
<div>
<label class="block font-label-lg text-label-lg text-on-surface-variant mb-xs" for="description">Description</label>
<textarea class="w-full bg-surface-container-low border-b-2 border-outline-variant focus:border-primary text-on-surface font-body-lg text-body-lg px-4 py-3 rounded-t-DEFAULT focus:outline-none focus:ring-0 transition-colors resize-none" id="description" rows="3">Standard 100k mile maintenance. Noticed slight squeal on cold starts.</textarea>
</div>
</section>
<!-- Categorization Card -->
<section class="bg-surface-container-lowest rounded-xl p-lg shadow-sm shadow-on-background/10 space-y-xl border border-surface-variant/50">
<!-- Area Segmented Control -->
<div class="space-y-sm">
<span class="block font-label-lg text-label-lg text-on-surface-variant mb-xs">Area of Vehicle</span>
<div class="relative">
<select class="w-full bg-surface-container-low border-b-2 border-outline-variant focus:border-primary text-on-surface font-body-lg text-body-lg px-4 py-3 rounded-t-DEFAULT appearance-none focus:outline-none focus:ring-0 transition-colors cursor-pointer" id="vehicle-area">
<option selected="" value="engine">Engine</option>
<option value="chassis">Chassis</option>
<option value="electrics">Electrics</option>
<option value="interior">Interior</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-on-surface-variant">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
<!-- Urgency Selector -->
<div class="space-y-sm">
<span class="block font-label-lg text-label-lg text-on-surface-variant">Urgency</span>
<div class="grid grid-cols-3 gap-md">
<label class="cursor-pointer">
<input class="peer sr-only" name="urgency" type="radio" value="low"/>
<div class="text-center py-3 border-2 border-outline-variant rounded-lg peer-checked:border-primary peer-checked:bg-primary-fixed peer-checked:text-on-primary-fixed text-on-surface-variant font-label-lg text-label-lg transition-all">
                            Low
                        </div>
</label>
<label class="cursor-pointer">
<input checked="" class="peer sr-only" name="urgency" type="radio" value="medium"/>
<div class="text-center py-3 border-2 border-outline-variant rounded-lg peer-checked:border-secondary-container peer-checked:bg-secondary-fixed peer-checked:text-on-secondary-fixed text-on-surface-variant font-label-lg text-label-lg transition-all">
                            Medium
                        </div>
</label>
<label class="cursor-pointer">
<input class="peer sr-only" name="urgency" type="radio" value="high"/>
<div class="text-center py-3 border-2 border-outline-variant rounded-lg peer-checked:border-error peer-checked:bg-error-container peer-checked:text-on-error-container text-on-surface-variant font-label-lg text-label-lg transition-all">
                            High
                        </div>
</label>
</div>
</div>
<!-- Modification Toggle -->
<div class="flex items-center justify-between pt-md border-t border-surface-variant">
<div>
<span class="block font-body-lg text-body-lg text-on-surface">Mark as Modification</span>
<span class="block font-body-md text-body-md text-on-surface-variant">Logs this as an upgrade rather than maintenance.</span>
</div>
<button aria-checked="false" class="relative inline-flex h-6 w-11 flex-shrink-0 cursor-pointer rounded-full border-2 border-transparent bg-surface-variant transition-colors duration-200 ease-in-out focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" role="switch" type="button">
<span aria-hidden="true" class="pointer-events-none inline-block h-5 w-5 transform rounded-full bg-outline shadow ring-0 transition duration-200 ease-in-out translate-x-0"></span>
</button>
</div>
</section>
<!-- Parts List -->
<section class="space-y-md">
<div class="flex items-center justify-between">
<h2 class="font-title-lg text-title-lg text-on-surface">Parts List</h2>
</div>
<div class="bg-surface-container-lowest rounded-xl shadow-sm shadow-on-background/10 border border-surface-variant/50 overflow-hidden divide-y divide-surface-variant">
<!-- Part Item 1 -->
<div class="p-md flex items-start justify-between group">
<div class="flex items-center gap-md">
<div class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center text-primary">
<span class="material-symbols-outlined">settings</span>
</div>
<div>
<p class="font-body-lg text-body-lg text-on-surface">Aisin Timing Belt Kit</p>
<p class="font-body-md text-body-md text-on-surface-variant">Part #TKF-001</p>
</div>
</div>
<button aria-label="Remove part" class="text-outline hover:text-error transition-colors p-2">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Add Part Button inside the list context -->
<button class="w-full p-md flex items-center justify-center gap-sm text-primary font-label-lg text-label-lg hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined text-[18px]">add</span>
                    Add Part
                </button>
</div>
</section>
<!-- Media Upload -->
<section class="space-y-sm">
<h2 class="font-title-lg text-title-lg text-on-surface">Media</h2>
<div class="border-2 border-dashed border-outline-variant rounded-xl p-xl flex flex-col items-center justify-center text-center bg-surface-container-lowest hover:bg-surface-container-low transition-colors cursor-pointer group">
<div class="w-12 h-12 rounded-full bg-primary-fixed text-on-primary-fixed flex items-center justify-center mb-sm group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined">add_a_photo</span>
</div>
<p class="font-body-lg text-body-lg text-on-surface">Upload Photos or Receipts</p>
<p class="font-body-md text-body-md text-on-surface-variant mt-1">PNG, JPG up to 10MB</p>
</div>
<!-- Existing Media Thumbnails (Optional Context) -->
<div class="flex gap-md overflow-x-auto hide-scrollbar pt-sm">
<div class="w-20 h-20 rounded-lg bg-surface-container flex-shrink-0 relative overflow-hidden group">
<div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1619642751034-765dfdf7c58e?auto=format&amp;fit=crop&amp;q=80&amp;w=200')] bg-cover bg-center" data-alt="Close up of a dirty engine bay with a focus on a worn timing belt cover in a garage setting"></div>
<button class="absolute top-1 right-1 bg-surface/80 text-error rounded-full p-1 opacity-0 group-hover:opacity-100 transition-opacity backdrop-blur-sm">
<span class="material-symbols-outlined text-[14px]">close</span>
</button>
</div>
</div>
</section>
<!-- Footer Actions -->
<footer class="pt-xl space-y-lg flex flex-col">
<button class="w-full bg-primary text-on-primary font-title-lg text-title-lg py-4 rounded-xl shadow-sm hover:shadow-md hover:bg-primary/90 transition-all active:scale-[0.98] border border-primary-container/20">
                Save Changes
            </button>
<button class="w-full text-secondary font-label-lg text-label-lg py-4 uppercase tracking-widest hover:bg-surface-container rounded-lg transition-colors">
                Delete Repair
            </button>
</footer>
</main>
<style>
        /* Hide scrollbar for clean look in horizontal lists */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</body></html>
