name: CI

on:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  CARFUL_API_BASE_URL: https://api.carful.diy

jobs:
  mobile-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.7"
          cache: true

      - name: Install Flutter dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Run test suite
        working-directory: mobile
        run: flutter test test --dart-define=CARFUL_API_BASE_URL="${CARFUL_API_BASE_URL}"

  backend-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run backend tests
        working-directory: backend
        run: pytest
