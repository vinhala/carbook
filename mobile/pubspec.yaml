name: carful
description: Carful mobile app for tracking car profiles, mileage, and reminders.
publish_to: 'none'
version: 1.0.1+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  drift: ^2.32.1
  file_picker: ^10.3.2
  flutter_local_notifications: ^21.0.0
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.2
  google_fonts: ^8.0.2
  http: ^1.4.0
  image_picker: ^1.2.1
  intl: ^0.20.2
  open_filex: ^4.7.0
  path: ^1.9.1
  path_provider: ^2.1.5
  sqlite3_flutter_libs: ^0.6.0+eol
  timezone: ^0.11.0
  url_launcher: ^6.3.2
  uuid: ^4.5.1

dev_dependencies:
  build_runner: ^2.14.0
  drift_dev: ^2.32.1
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  mocktail: ^1.0.5

flutter:
  uses-material-design: true
